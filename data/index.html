<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPC FEB Control</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body data-page="dashboard">
    <nav class="nav">
        <a href="/">Dashboard</a>
        <a href="/wifi">WiFi</a>
        <a href="/feb?id=0">FEB A</a>
        <a href="/feb?id=1">FEB B</a>
        <a href="/feb?id=2">FEB C</a>
        <a href="/feb?id=3">FEB D</a>
        <button onclick="fetchStatus()">Refresh</button>
        <button onclick="exportConfig()">Export Config</button>
        <span id="wifi-info"></span>
    </nav>

    <div class="wrapper">
    <h1>RPC FEB Slow Control</h1>

    <div class="control-bar">
        <div class="control-row">
            <span class="control-label">Threshold:</span>
            <input type="number" id="threshold-voltage" value="220" min="0" max="5000" step="10" class="voltage-input">
            <button onclick="setAllFEBs('threshold')">Set All FEBs</button>
            <button onclick="setFEB(0, 'threshold')">FEB A</button>
            <button onclick="setFEB(1, 'threshold')">FEB B</button>
            <button onclick="setFEB(2, 'threshold')">FEB C</button>
            <button onclick="setFEB(3, 'threshold')">FEB D</button>
        </div>
        <div class="control-row">
            <span class="control-label">VMon:</span>
            <input type="number" id="vmon-voltage" value="3500" min="0" max="5000" step="10" class="voltage-input">
            <button onclick="setAllFEBs('vmon')">Set All FEBs</button>
            <button onclick="setFEB(0, 'vmon')">FEB A</button>
            <button onclick="setFEB(1, 'vmon')">FEB B</button>
            <button onclick="setFEB(2, 'vmon')">FEB C</button>
            <button onclick="setFEB(3, 'vmon')">FEB D</button>
        </div>
        <div class="control-row">
            <input type="file" id="import-file" accept=".json" style="display:none">
            <button onclick="document.getElementById('import-file').click()">Import Config</button>
            <span style="color:#666;font-size:13px;margin-left:8px">.json file</span>
        </div>
    </div>

    <div id="febs-container" class="feb-grid"></div>

    </div>
    <script src="/app.js"></script>
</body>
</html>
